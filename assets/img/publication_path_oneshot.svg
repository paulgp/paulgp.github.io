<svg width="100%" viewBox="0 0 760 860" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-big" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
    .purple-text { fill: #3C3489; }
    .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
    .teal-text { fill: #085041; }
    .blue-fill { fill: #E6F1FB; stroke: #185FA5; }
    .blue-text { fill: #0C447C; }
    .amber-fill { fill: #FAEEDA; stroke: #854F0B; }
    .amber-text { fill: #633806; }
    .coral-fill { fill: #FAECE7; stroke: #993C1D; }
    .coral-text { fill: #712B13; }
    .green-fill { fill: #EAF3DE; stroke: #3B6D11; }
    .green-text { fill: #27500A; }
  </style>
</defs>

<!-- Stage 1: Ideation -->
<rect class="purple-fill" x="40" y="30" width="600" height="66" rx="10" stroke-width="0.5"/>
<text class="th purple-text" x="80" y="56" dominant-baseline="central">1 · Ideation</text>
<text class="ts purple-text" x="80" y="76" dominant-baseline="central">Getting an idea</text>

<!-- Arrow 1→2 -->
<line x1="340" y1="96" x2="340" y2="118" stroke="#888" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Stage 2: Design & Feasibility -->
<rect class="teal-fill" x="40" y="118" width="600" height="66" rx="10" stroke-width="0.5"/>
<text class="th teal-text" x="80" y="144" dominant-baseline="central">2 · Design &amp; Feasibility</text>
<text class="ts teal-text" x="80" y="164" dominant-baseline="central">Data sources · empirical strategy · identification · power calculations</text>

<!-- Arrow 2→3 -->
<line x1="340" y1="184" x2="340" y2="206" stroke="#888" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Stage 3: Data Assembly -->
<rect class="teal-fill" x="40" y="206" width="600" height="66" rx="10" stroke-width="0.5"/>
<text class="th teal-text" x="80" y="232" dominant-baseline="central">3 · Data Assembly</text>
<text class="ts teal-text" x="80" y="252" dominant-baseline="central">Collecting · cleaning · merging · variables · summary statistics</text>

<!-- Arrow 3→4 -->
<line x1="340" y1="272" x2="340" y2="294" stroke="#888" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Stage 4: Core Analysis -->
<rect class="blue-fill" x="40" y="294" width="600" height="66" rx="10" stroke-width="0.5"/>
<text class="th blue-text" x="80" y="320" dominant-baseline="central">4 · Core Analysis</text>
<text class="ts blue-text" x="80" y="340" dominant-baseline="central">Main specifications · models · iterating between results and design</text>

<!-- Back-arrow 4→3 (iteration loop) -->
<path d="M640 310 Q668 310 668 240 Q668 170 640 170" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.4" marker-end="url(#arrow)"/>
<text style="font-family:sans-serif;font-size:13px;fill:#666;" x="672" y="244">iterate</text>

<!-- Arrow 4→5 -->
<line x1="340" y1="360" x2="340" y2="382" stroke="#888" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Stage 5: Robustness & Extensions -->
<rect class="blue-fill" x="40" y="382" width="600" height="66" rx="10" stroke-width="0.5"/>
<text class="th blue-text" x="80" y="408" dominant-baseline="central">5 · Robustness &amp; Extensions</text>
<text class="ts blue-text" x="80" y="428" dominant-baseline="central">Alt specs · placebos · heterogeneity · mechanism exploration</text>

<!-- Arrow 5→6 -->
<line x1="340" y1="448" x2="340" y2="470" stroke="#888" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Stage 6: Writing -->
<rect class="amber-fill" x="40" y="470" width="600" height="66" rx="10" stroke-width="0.5"/>
<text class="th amber-text" x="80" y="496" dominant-baseline="central">6 · Writing</text>
<text class="ts amber-text" x="80" y="516" dominant-baseline="central">Drafting · tables &amp; figures · internal circulation for feedback</text>

<!-- Back-arrow 6→4 -->
<path d="M40 500 Q14 500 14 327 Q14 155 40 155" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.25" marker-end="url(#arrow)"/>

<!-- Arrow 6→7 -->
<line x1="340" y1="536" x2="340" y2="558" stroke="#888" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Stage 7: Submission & Review -->
<rect class="coral-fill" x="40" y="558" width="600" height="78" rx="10" stroke-width="0.5"/>
<text class="th coral-text" x="80" y="584" dominant-baseline="central">7 · Posting, Submission &amp; Review</text>
<text class="ts coral-text" x="80" y="604" dominant-baseline="central">Seminars · conferences · feedback · journal submission</text>
<text class="ts coral-text" x="80" y="622" dominant-baseline="central">R&amp;R · revising per referee/editor demands</text>

<!-- Back-arrow 7→6 (revisions) -->
<path d="M640 610 Q660 610 660 503 Q660 496 640 496" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.4" marker-end="url(#arrow)"/>
<text style="font-family:sans-serif;font-size:13px;fill:#666;" x="664" y="558">revise</text>

<!-- Arrow 7→8 -->
<line x1="340" y1="636" x2="340" y2="658" stroke="#888" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Stage 8: Publication & Dissemination -->
<rect class="green-fill" x="40" y="658" width="600" height="66" rx="10" stroke-width="0.5"/>
<text class="th green-text" x="80" y="684" dominant-baseline="central">8 · Publication &amp; Dissemination</text>
<text class="ts green-text" x="80" y="704" dominant-baseline="central">Final acceptance · working paper · policy briefs · replication package</text>

<!-- Legend -->
<line x1="56" y1="788" x2="96" y2="788" stroke="#888" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
<text style="font-family:sans-serif;font-size:12px;fill:#888;" x="104" y="792">forward progress</text>
<line x1="260" y1="788" x2="300" y2="788" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.4" marker-end="url(#arrow)"/>
<text style="font-family:sans-serif;font-size:12px;fill:#888;" x="308" y="792">iteration loop</text>

<!-- AI one-shot big arrow (on top of everything) -->
<line x1="610" y1="118" x2="610" y2="648" stroke="#7F77DD" stroke-width="22" stroke-linecap="round" opacity="0.2"/>
<line x1="610" y1="118" x2="610" y2="645" stroke="#7F77DD" stroke-width="5" stroke-linecap="round" opacity="0.9" marker-end="url(#arrow-big)"/>
<text style="font-family:sans-serif;font-size:13px;font-weight:500;fill:#534AB7;" text-anchor="middle" transform="translate(626,388) rotate(90)">AI one-shot</text>

</svg>
