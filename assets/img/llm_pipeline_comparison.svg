<line x1="555" y1="408" x2="555" y2="428" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 6: Writing — very strong compression -->
<rect class="amber-fill" x="400" y="428" width="310" height="50" rx="10" stroke-width="0.5"/>
