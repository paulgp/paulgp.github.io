<!-- RIGHT COLUMN: With LLM (compressed spacing)  -->
<!-- ============================================ -->

<!-- Stage 1: Ideation — modest compression -->
<rect class="purple-fill" x="400" y="76" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th purple-text" x="430" y="96" dominant-baseline="central">1 · Ideation</text>
<text class="ts" x="430" y="112" dominant-baseline="central" style="fill:#534AB7">Getting an idea</text>

<line x1="555" y1="126" x2="555" y2="148" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

