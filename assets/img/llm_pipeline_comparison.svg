<text class="th teal-text" x="430" y="238" dominant-baseline="central">3 · Data Assembly</text>
<text class="ts" x="430" y="254" dominant-baseline="central" style="fill:#0F6E56">Collecting · cleaning · merging</text>

<line x1="555" y1="268" x2="555" y2="288" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

