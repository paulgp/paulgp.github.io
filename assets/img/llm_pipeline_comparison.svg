<text class="th coral-text" x="430" y="518" dominant-baseline="central">7 · Submission &amp; Review</text>
<text class="ts" x="430" y="534" dominant-baseline="central" style="fill:#993C1D">R&amp;R · revising · seminars</text>

<line x1="555" y1="548" x2="555" y2="568" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 8: Publication -->
