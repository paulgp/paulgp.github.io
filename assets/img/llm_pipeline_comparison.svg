<text class="th blue-text" x="430" y="308" dominant-baseline="central">4 · Core Analysis</text>
<text class="ts" x="430" y="324" dominant-baseline="central" style="fill:#185FA5">Main specifications · models</text>

<line x1="555" y1="338" x2="555" y2="358" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 5: Robustness & Extensions — strong compression -->
<rect class="blue-fill" x="400" y="358" width="310" height="50" rx="10" stroke-width="0.5"/>
