<svg width="100%" viewBox="0 0 740 920" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .tl { font-size: 10px; font-weight: 400; fill: #999; }
    .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
    .purple-text { fill: #3C3489; }
    .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
    .teal-text { fill: #085041; }
    .blue-fill { fill: #E6F1FB; stroke: #185FA5; }
    .blue-text { fill: #0C447C; }
    .amber-fill { fill: #FAEEDA; stroke: #854F0B; }
    .amber-text { fill: #633806; }
    .coral-fill { fill: #FAECE7; stroke: #993C1D; }
    .coral-text { fill: #712B13; }
    .green-fill { fill: #EAF3DE; stroke: #3B6D11; }
    .green-text { fill: #27500A; }
  </style>
</defs>

<!-- ============================================ -->
<!-- COLUMN HEADERS                               -->
<!-- ============================================ -->
<text class="th" x="185" y="30" text-anchor="middle" style="font-size:15px;">Without LLM</text>
<text class="ts" x="185" y="48" text-anchor="middle">Traditional pace</text>

<text class="th" x="555" y="30" text-anchor="middle" style="font-size:15px;">With LLM</text>
<text class="ts" x="555" y="48" text-anchor="middle">Compressed iterations</text>


<!-- ============================================ -->
<!-- LEFT COLUMN: Without LLM (full spacing)      -->
<!-- ============================================ -->

<!-- Stage 1: Ideation -->
<rect class="purple-fill" x="30" y="76" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th purple-text" x="60" y="96" dominant-baseline="central">1 · Ideation</text>
<text class="ts" x="60" y="112" dominant-baseline="central" style="fill:#534AB7">Getting an idea</text>

<line x1="185" y1="126" x2="185" y2="176" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 2: Design & Feasibility -->
<rect class="teal-fill" x="30" y="176" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th teal-text" x="60" y="196" dominant-baseline="central">2 · Design &amp; Feasibility</text>
<text class="ts" x="60" y="212" dominant-baseline="central" style="fill:#0F6E56">Empirical strategy · identification</text>

<line x1="185" y1="226" x2="185" y2="296" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 3: Data Assembly -->
<rect class="teal-fill" x="30" y="296" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th teal-text" x="60" y="316" dominant-baseline="central">3 · Data Assembly</text>
<text class="ts" x="60" y="332" dominant-baseline="central" style="fill:#0F6E56">Collecting · cleaning · merging</text>

<line x1="185" y1="346" x2="185" y2="416" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 4: Core Analysis -->
<rect class="blue-fill" x="30" y="416" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th blue-text" x="60" y="436" dominant-baseline="central">4 · Core Analysis</text>
<text class="ts" x="60" y="452" dominant-baseline="central" style="fill:#185FA5">Main specifications · models</text>

<line x1="185" y1="466" x2="185" y2="536" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 5: Robustness & Extensions -->
<rect class="blue-fill" x="30" y="536" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th blue-text" x="60" y="556" dominant-baseline="central">5 · Robustness &amp; Extensions</text>
<text class="ts" x="60" y="572" dominant-baseline="central" style="fill:#185FA5">Alt specs · heterogeneity</text>

<line x1="185" y1="586" x2="185" y2="656" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 6: Writing -->
<rect class="amber-fill" x="30" y="656" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th amber-text" x="60" y="676" dominant-baseline="central">6 · Writing</text>
<text class="ts" x="60" y="692" dominant-baseline="central" style="fill:#854F0B">Drafting · tables &amp; figures</text>

<line x1="185" y1="706" x2="185" y2="756" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 7: Submission & Review -->
<rect class="coral-fill" x="30" y="756" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th coral-text" x="60" y="776" dominant-baseline="central">7 · Submission &amp; Review</text>
<text class="ts" x="60" y="792" dominant-baseline="central" style="fill:#993C1D">R&amp;R · revising · seminars</text>

<line x1="185" y1="806" x2="185" y2="836" stroke="#888" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Stage 8: Publication -->
<rect class="green-fill" x="30" y="836" width="310" height="50" rx="10" stroke-width="0.5"/>
<text class="th green-text" x="60" y="856" dominant-baseline="central">8 · Publication</text>
<text class="ts" x="60" y="872" dominant-baseline="central" style="fill:#3B6D11">Final acceptance · dissemination</text>


